<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper N More Calculators</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px 20px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 36px;
        }

        .header p {
            margin: 0;
            font-size: 20px;
            color: #555;
        }

        .calculator-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .calculator-button {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 85px;
            padding: 18px;
            border-radius: 12px;
            background: #ffffff;
            color: #222222;
            text-decoration: none;
            text-align: center;
            font-size: 21px;
            font-weight: bold;
            border: 2px solid #cccccc;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        .calculator-button:hover,
        .calculator-button:focus {
            background: #eeeeee;
            border-color: #888888;
        }

        .footer {
            margin-top: 35px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (min-width: 700px) {
            .calculator-list {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="container">

        <header class="header">
            <h1>Wallpaper N More</h1>
            <p>Wallpaper Calculators</p>
        </header>

        <section class="calculator-list">

            <a class="calculator-button"
               href="21 inch x 33'L w Sheet Variable.html">
                21 inch x 33'L<br>w Sheet Variable
            </a>

            <a class="calculator-button"
               href="27 inch x 27'L w Sheet Variable.html">
                27 inch x 27'L<br>w Sheet Variable
            </a>

            <a class="calculator-button"
               href="27 inch x 33'L w Sheet Variable.html">
                27 inch x 33'L<br>w Sheet Variable
            </a>

            <a class="calculator-button"
               href="42 inch x 33'L w Sheet Variable (Double Double Roll).html">
                42 inch x 33'L<br>w Sheet Variable<br>
                (Double Double Roll)
            </a>

            <a class="calculator-button"
               href="Grasscloth Type Yardage Calculator w Sheet Variable.html">
                Grasscloth Type Yardage Calculator<br>
                w Sheet Variable
            </a>

            <a class="calculator-button"
               href="New Commercial Width Calculator.html">
                New Commercial Width Calculator
            </a>

        </section>

        <footer class="footer">
            Wallpaper N More, LLC
        </footer>

    </main>
</body>
</html>
