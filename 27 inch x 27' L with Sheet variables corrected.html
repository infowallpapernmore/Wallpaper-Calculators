<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>27"W x 27' L - Wide Wallpaper Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      max-width: 800px;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.4rem;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 1.5rem;
      margin-right: 0.75rem;
      padding: 0.7rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
    }
    .result {
      margin-top: 1.5rem;
      font-weight: bold;
      line-height: 1.6;
    }
    .print-header {
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    @media print {
      button {
        display: none;
      }

      input {
        border: none;
        padding: 0;
      }

      body {
        margin: 0.5in;
        max-width: none;
      }

      h1 {
        margin-top: 0;
      }

      p {
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>

<h1>27"W x 27' Long - Wallpaper Calculator</h1>

<label for="projectName">Project Name:</label>
<input type="text" id="projectName" placeholder="Enter project name" />

<label for="roomName">Room Name:</label>
<input type="text" id="roomName" placeholder="Enter room name" />

<label for="wallWidth">Width of Wall (inches):</label>
<input type="number" id="wallWidth" min="0" step="any" />

<label for="wallpaperWidth">Width of Wallpaper (inches):</label>
<input type="number" id="wallpaperWidth" min="0" step="any" />

<label for="wallHeight">Height of Wall (inches):</label>
<input type="number" id="wallHeight" min="0" step="any" />

<label for="repeatSize">Repeat Size (inches):</label>
<input type="number" id="repeatSize" min="0" step="any" />

<label for="numWalls">Number of Walls: <small>**If using a combined width number for multiple walls, enter 1</small></label>
<input type="number" id="numWalls" min="1" value="1" />

<button onclick="calculate()">Calculate</button>
<button onclick="window.print()">Print</button>

<div class="print-header" id="printHeader"></div>
<div class="result" id="result"></div>

<script>
function calculate() {
  const projectName = document.getElementById('projectName').value.trim();
  const roomName = document.getElementById('roomName').value.trim();
  const wallWidth = parseFloat(document.getElementById('wallWidth').value);
  const wallpaperWidth = parseFloat(document.getElementById('wallpaperWidth').value);
  const wallHeight = parseFloat(document.getElementById('wallHeight').value);
  const repeatSize = parseFloat(document.getElementById('repeatSize').value);
  const numWalls = parseInt(document.getElementById('numWalls').value) || 1;

  if (
    isNaN(wallWidth) || wallWidth <= 0 ||
    isNaN(wallpaperWidth) || wallpaperWidth <= 0 ||
    isNaN(wallHeight) || wallHeight <= 0 ||
    isNaN(repeatSize) || repeatSize <= 0 ||
    numWalls < 1
  ) {
    document.getElementById('printHeader').innerHTML = "";
    document.getElementById('result').textContent = "Please enter positive numbers for all fields.";
    return;
  }

  const totalWallWidth = wallWidth * numWalls;
  const sheetsNeeded = Math.ceil(totalWallWidth / wallpaperWidth);
  const numberOfRepeats = Math.ceil(wallHeight / repeatSize);
  const heightOfSheet = repeatSize * numberOfRepeats;
  const linearInches = sheetsNeeded * heightOfSheet;
  const rollsByLinearInches = linearInches / 300;

  let finalRolls;
  let methodUsed;

  if (heightOfSheet >= 162) {
    finalRolls = sheetsNeeded;
    methodUsed = 'Tall walls (162"+): Using number of sheets as double rolls.';
  } else if (heightOfSheet >= 109 && heightOfSheet < 162) {
    finalRolls = Math.ceil(sheetsNeeded / 2);
    methodUsed = 'Medium walls (109–161"): Using sheets ÷ 2 as double rolls.';
  } else {
    finalRolls = Math.ceil(rollsByLinearInches);
    methodUsed = 'Short walls (<109"): Using linear inches ÷ 300.';
  }

  document.getElementById('printHeader').innerHTML =
    `<strong>Project Name:</strong> ${projectName || 'N/A'}<br>` +
    `<strong>Room Name:</strong> ${roomName || 'N/A'}`;

  document.getElementById('result').innerHTML =
    `Walls Counted: ${numWalls}<br>` +
    `Total Wall Width: ${totalWallWidth} inches<br>` +
    `Sheets Needed: ${sheetsNeeded}<br>` +
    `Number of Repeats: ${numberOfRepeats}<br>` +
    `Height of Sheet: ${heightOfSheet.toFixed(2)} inches<br>` +
    `Linear Inches: ${linearInches.toFixed(2)}<br>` +
    `Final Result in Double Rolls (Linear Inches ÷ 300): ${rollsByLinearInches.toFixed(4)}<br><br>` +
    `<strong>Final Double Rolls Needed: ${finalRolls}</strong><br>` +
    `<em>${methodUsed}</em>`;
}
</script>

<br>
<p>
  If there is a window that needs to be wrapped, add 1 more double roll to this total.
  Two wrapped windows = 1 extra double roll.
</p>

</body>
</html>
